<div class="modal-card" xmlns:xis="https://xis.one/xsd">
    <h2>Complete reminder</h2>
    <xis:form binding="done" class="modal-form">
        <input xis:binding="followUpId" type="hidden"/>
        <p class="intro">Mark this scheduled follow-up as done?</p>
        <div class="action-row right">
            <button class="ghost" xis:action="cancel" type="button">Cancel</button>
            <button class="primary" xis:action="save">Mark done</button>
        </div>
    </xis:form>
</div>
