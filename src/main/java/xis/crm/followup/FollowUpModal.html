<div class="modal-card" xmlns:xis="https://xis.one/xsd">
    <h2>Schedule follow-up</h2>
    <xis:form binding="followUp" class="modal-form">
        <xis:global-messages/>
        <input xis:binding="customerId" type="hidden"/>
        <label xis:binding="dueDate" xis:error-class="error">Due date <input xis:binding="dueDate" xis:error-class="error" type="datetime-local"/></label>
        <xis:message class="field-error" message-for="dueDate"/>
        <label xis:binding="task" xis:error-class="error">Task <input xis:binding="task" xis:error-class="error"/></label>
        <xis:message class="field-error" message-for="task"/>
        <div class="action-row right">
            <button class="ghost" xis:action="cancel" type="button">Cancel</button>
            <button class="primary" xis:action="save">Schedule</button>
        </div>
    </xis:form>
</div>
