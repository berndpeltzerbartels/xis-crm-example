<div class="modal-card" xmlns:xis="https://xis.one/xsd">
    <h2>Add contact</h2>
    <xis:form binding="contact" class="modal-form">
        <xis:global-messages/>
        <input xis:binding="customerId" type="hidden"/>
        <div class="two-columns">
            <label xis:binding="contactDate" xis:error-class="error">Date <input xis:binding="contactDate" xis:error-class="error" type="date"/></label>
            <label xis:binding="channel" xis:error-class="error">Channel
                <select xis:binding="channel" xis:error-class="error">
                    <option value="Call">Call</option>
                    <option value="Email">Email</option>
                    <option value="Meeting">Meeting</option>
                    <option value="Workshop">Workshop</option>
                </select>
            </label>
        </div>
        <div class="two-columns">
            <xis:message class="field-error" message-for="contactDate"/>
            <xis:message class="field-error" message-for="channel"/>
        </div>
        <label xis:binding="description" xis:error-class="error">Description <textarea xis:binding="description" xis:error-class="error"></textarea></label>
        <xis:message class="field-error" message-for="description"/>
        <div class="action-row right">
            <button class="ghost" xis:action="cancel" type="button">Cancel</button>
            <button class="primary" xis:action="save">Save contact</button>
        </div>
    </xis:form>
</div>
